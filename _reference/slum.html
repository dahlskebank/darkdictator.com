// ─── Audio Engine ───────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
const getCtx = () => {
	if (!audioCtx) audioCtx = new AudioCtx();
	return audioCtx;
};

const playClick = () => {
	const ctx = getCtx();
	const t = ctx.currentTime;
	const osc = ctx.createOscillator();
	const gain = ctx.createGain();
	const noise = ctx.createOscillator();
	const noiseGain = ctx.createGain();

	osc.type = "square";
	osc.frequency.setValueAtTime(1800, t);
	osc.frequency.exponentialRampToValueAtTime(400, t + 0.04);
	gain.gain.setValueAtTime(0.15, t);
	gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
	osc.connect(gain).connect(ctx.destination);
	osc.start(t);
	osc.stop(t + 0.06);

	noise.type = "sawtooth";
	noise.frequency.setValueAtTime(120, t);
	noiseGain.gain.setValueAtTime(0.08, t);
	noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
	noise.connect(noiseGain).connect(ctx.destination);
	noise.start(t);
	noise.stop(t + 0.03);
};

const playClank = () => {
	const ctx = getCtx();
	const t = ctx.currentTime;
	const osc = ctx.createOscillator();
	const gain = ctx.createGain();
	const osc2 = ctx.createOscillator();
	const gain2 = ctx.createGain();

	osc.type = "square";
	osc.frequency.setValueAtTime(90, t);
	osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
	gain.gain.setValueAtTime(0.2, t);
	gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
	osc.connect(gain).connect(ctx.destination);
	osc.start(t);
	osc.stop(t + 0.15);

	osc2.type = "triangle";
	osc2.frequency.setValueAtTime(2400, t);
	osc2.frequency.exponentialRampToValueAtTime(200, t + 0.02);
	gain2.gain.setValueAtTime(0.12, t);
	gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
	osc2.connect(gain2).connect(ctx.destination);
	osc2.start(t);
	osc2.stop(t + 0.05);
};

const playBoot = () => {
	const ctx = getCtx();
	const t = ctx.currentTime;
	[0, 0.08, 0.16, 0.28].forEach((offset, i) => {
		const osc = ctx.createOscillator();
		const gain = ctx.createGain();
		osc.type = "square";
		osc.frequency.setValueAtTime([200, 300, 400, 800][i], t + offset);
		gain.gain.setValueAtTime(0.06, t + offset);
		gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.07);
		osc.connect(gain).connect(ctx.destination);
		osc.start(t + offset);
		osc.stop(t + offset + 0.07);
	});
};

const playDeny = () => {
	const ctx = getCtx();
	const t = ctx.currentTime;
	const osc = ctx.createOscillator();
	const gain = ctx.createGain();
	osc.type = "square";
	osc.frequency.setValueAtTime(150, t);
	osc.frequency.setValueAtTime(100, t + 0.12);
	gain.gain.setValueAtTime(0.15, t);
	gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
	osc.connect(gain).connect(ctx.destination);
	osc.start(t);
	osc.stop(t + 0.3);
};

const Blinker = () => {
	const [on, setOn] = useState(true);
	useEffect(() => {
		const i = setInterval(() => setOn((p) => !p), 530);
		return () => clearInterval(i);
	}, []);
	return <span style={{ opacity: on ? 1 : 0 }}>█</span>;
};

const TypeWriter = ({ text, speed = 25, onDone }) => {
	const [displayed, setDisplayed] = useState("");
	const idx = useRef(0);
	useEffect(() => {
		idx.current = 0;
		setDisplayed("");
		const i = setInterval(() => {
			if (idx.current < text.length) {
				setDisplayed(text.slice(0, idx.current + 1));
				idx.current++;
				if (idx.current % 3 === 0) playClick();
			} else {
				clearInterval(i);
				onDone?.();
			}
		}, speed);
		return () => clearInterval(i);
	}, [text]);
	return (
		<span>
			{displayed}
			{displayed.length < text.length && <Blinker />}
		</span>
	);
};

function SovietTerminal() {
	const [booted, setBooted] = useState(false);
	const [activeSection, setActiveSection] = useState("home");
	const [focusIdx, setFocusIdx] = useState(0);
	const [showContent, setShowContent] = useState(false);
	const [scanlineOffset, setScanlineOffset] = useState(0);
	const navRefs = useRef([]);
	const containerRef = useRef(null);

	useEffect(() => {
		const i = setInterval(() => setScanlineOffset((p) => (p + 1) % 4), 80);
		return () => clearInterval(i);
	}, []);

	const navigate = useCallback((id, idx) => {
		playClank();
		setShowContent(false);
		setActiveSection(id);
		setFocusIdx(idx);
		setTimeout(() => setShowContent(true), 100);
	}, []);

	useEffect(() => {
		if (!booted) return;
		const handler = (e) => {
			if (e.key >= "1" && e.key <= "5") {
				const idx = parseInt(e.key) - 1;
				navigate(SECTIONS[idx].id, idx);
				navRefs.current[idx]?.focus();
				e.preventDefault();
			}
			if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
				const next = (focusIdx - 1 + SECTIONS.length) % SECTIONS.length;
				playClick();
				setFocusIdx(next);
				navRefs.current[next]?.focus();
				e.preventDefault();
			}
			if (e.key === "ArrowDown" || e.key === "ArrowRight") {
				const next = (focusIdx + 1) % SECTIONS.length;
				playClick();
				setFocusIdx(next);
				navRefs.current[next]?.focus();
				e.preventDefault();
			}
			if (e.key === "Enter") {
				navigate(SECTIONS[focusIdx].id, focusIdx);
				e.preventDefault();
			}
		};
		window.addEventListener("keydown", handler);
		return () => window.removeEventListener("keydown", handler);
	}, [booted, focusIdx, navigate]);

	useEffect(() => {
		if (booted) {
			setTimeout(() => setShowContent(true), 300);
			navRefs.current[0]?.focus();
		}
	}, [booted]);

	const ContentComponent = CONTENT_MAP[activeSection];

	return (
		<>
			<style>{`
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
          --green-bright: #33ff33;
          --green: #22cc22;
          --green-mid: #1a9a1a;
          --green-dim: #0d660d;
          --green-dark: #062806;
          --bg: #020a02;
          --glow: rgba(51, 255, 51, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.3; }
        }

        @keyframes flicker {
          0% { opacity: 0.97; }
          5% { opacity: 0.95; }
          10% { opacity: 0.98; }
          15% { opacity: 0.94; }
          20% { opacity: 0.98; }
          50% { opacity: 0.96; }
          80% { opacity: 0.98; }
          90% { opacity: 0.95; }
          100% { opacity: 0.97; }
        }

        @keyframes bootGlow {
          from { text-shadow: 0 0 4px var(--green); }
          to { text-shadow: 0 0 12px var(--green-bright), 0 0 24px var(--green); }
        }

        .crt-container {
          width: 100%;
          min-height: 100vh;
          background: var(--bg);
          font-family: 'VT323', monospace;
          color: var(--green);
          font-size: 14px;
          position: relative;
          overflow: hidden;
          animation: flicker 0.15s infinite;
        }

        .crt-container::before {
          content: '';
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.15) 0px,
            rgba(0, 0, 0, 0.15) 1px,
            transparent 1px,
            transparent 3px
          );
          pointer-events: none;
          z-index: 100;
        }

        .crt-container::after {
          content: '';
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
          pointer-events: none;
          z-index: 101;
        }

        .screen-content {
          position: relative;
          z-index: 10;
          max-width: 640px;
          margin: 0 auto;
          padding: 8px 12px;
        }

        .top-bar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 6px 0;
          border-bottom: 2px double var(--green-dim);
          margin-bottom: 4px;
          font-size: 11px;
          color: var(--green-dim);
        }

        .nav-bar {
          display: flex;
          flex-wrap: wrap;
          gap: 2px;
          padding: 4px 0;
          border-bottom: 1px solid var(--green-dark);
          margin-bottom: 6px;
        }

        .nav-item {
          background: none;
          border: 1px solid var(--green-dark);
          color: var(--green-dim);
          font-family: 'VT323', monospace;
          font-size: 13px;
          padding: 3px 10px;
          cursor: pointer;
          transition: all 0.05s;
          outline: none;
          flex: 1;
          text-align: center;
          min-width: 0;
        }

        .nav-item:hover,
        .nav-item:focus {
          background: var(--green-dark);
          color: var(--green-bright);
          border-color: var(--green);
          text-shadow: 0 0 8px var(--green);
          box-shadow: 0 0 6px var(--glow), inset 0 0 6px var(--glow);
        }

        .nav-item.active {
          background: var(--green-dim);
          color: #000;
          border-color: var(--green);
          font-weight: bold;
        }

        .nav-item.active:focus {
          color: #000;
          text-shadow: none;
        }

        .content-area {
          border: 1px solid var(--green-dim);
          padding: 10px 14px;
          min-height: 300px;
          position: relative;
          background: rgba(0, 20, 0, 0.3);
        }

        .content-header {
          color: var(--green-bright);
          font-size: 15px;
          padding-bottom: 4px;
          border-bottom: 1px solid var(--green-dark);
          margin-bottom: 8px;
          text-shadow: 0 0 8px var(--green);
          letter-spacing: 1px;
        }

        .footer-bar {
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 4px;
          padding: 6px 0;
          border-top: 2px double var(--green-dim);
          margin-top: 6px;
          font-size: 10px;
          color: var(--green-dim);
        }

        .soviet-btn:hover,
        .soviet-btn:focus {
          background: var(--green-dark) !important;
          text-shadow: 0 0 8px var(--green);
          box-shadow: 0 0 8px var(--glow);
          outline: none;
        }

        .fade-in {
          animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }

        .phosphor-trail {
          text-shadow: 0 0 3px var(--green), 0 0 6px rgba(51, 255, 51, 0.3);
        }
      `}</style>

			<div className="crt-container" ref={containerRef} tabIndex={-1}>
				<div className="screen-content">
					{!booted ? (
						<BootSequence
							onDone={() => {
								setBooted(true);
								playClank();
							}}
						/>
					) : (
						<div className="fade-in">
							{/* Top Status Bar */}
							<div className="top-bar">
								<span>☭ SLUM+ TERMINAL v2.41</span>
								<span>ГОССЕТЬ NODE 7</span>
								<span>
									{new Date().toLocaleTimeString("nb-NO", { hour: "2-digit", minute: "2-digit" })} MSK
								</span>
							</div>

							{/* Navigation */}
							<nav className="nav-bar" role="menubar" aria-label="Hovednavigasjon">
								{SECTIONS.map((s, i) => (
									<button
										key={s.id}
										ref={(el) => (navRefs.current[i] = el)}
										className={`nav-item ${activeSection === s.id ? "active" : ""}`}
										role="menuitem"
										tabIndex={focusIdx === i ? 0 : -1}
										onClick={() => navigate(s.id, i)}
										onFocus={() => {
											playClick();
											setFocusIdx(i);
										}}
										aria-current={activeSection === s.id ? "page" : undefined}
									>
										{s.shortTitle}
									</button>
								))}
							</nav>

							{/* Content */}
							<div className="content-area">
								<div className="content-header phosphor-trail">
									{SECTIONS.find((s) => s.id === activeSection)?.title}
								</div>
								{showContent && (
									<div className="fade-in phosphor-trail">
										<ContentComponent />
									</div>
								)}
							</div>

							{/* Footer */}
							<div className="footer-bar">
								<span>PILTASTER: NAVIGER</span>
								<span>1-5: HURTIGVALG</span>
								<span>ENTER: VELG</span>
								<span>KLASSIFISERT</span>
							</div>
							<div
								style={{
									textAlign: "center",
									fontSize: 9,
									color: "var(--green-dark)",
									padding: "4px 0",
								}}
							>
								SENTRALKOMITÉEN FOR DIGITAL KULTUR — ALLE RETTIGHETER TILHØRER FOLKET — 1983
							</div>
						</div>
					)}
				</div>
			</div>
		</>
	);
}

ReactDOM.createRoot(document.getElementById("root")).render(<SovietTerminal />);
    </script>
  </body>
</html>
