<?xml version="1.0" encoding="UTF-8"?>
<!--
	OG image — 1200×630 (Open Graph standard).
	Most social crawlers prefer PNG/JPG over SVG. Render this once to PNG
	(open in browser, screenshot, or use ImageMagick: `magick og-image.svg
	og-image.png`) and update the og:image meta to point to og-image.png.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
	<defs>
		<radialGradient id="bg" cx="50%" cy="50%" r="70%">
			<stop offset="0%" stop-color="#0a1a0a"/>
			<stop offset="100%" stop-color="#020602"/>
		</radialGradient>
		<radialGradient id="vignette" cx="50%" cy="50%" r="60%">
			<stop offset="50%" stop-color="rgba(0,0,0,0)"/>
			<stop offset="100%" stop-color="rgba(0,0,0,0.85)"/>
		</radialGradient>
		<pattern id="scanlines" width="1" height="3" patternUnits="userSpaceOnUse">
			<rect width="1" height="1" fill="rgba(0,0,0,0.4)"/>
			<rect y="1" width="1" height="2" fill="rgba(51,255,51,0.06)"/>
		</pattern>
		<filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="2" result="blur"/>
			<feMerge>
				<feMergeNode in="blur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
	</defs>

	<rect width="1200" height="630" fill="url(#bg)"/>
	<rect width="1200" height="630" fill="url(#scanlines)"/>

	<!-- Inner screen frame -->
	<rect x="80" y="60" width="1040" height="510" fill="rgba(0,12,0,0.5)" stroke="#22cc22" stroke-width="2" rx="14"/>

	<!-- Top status bar -->
	<g font-family="'VT323', 'Courier New', monospace" fill="#1a9a1a">
		<text x="120" y="115" font-size="28">◉ SoAP Terminal v1.0.1</text>
		<text x="600" y="115" font-size="28" text-anchor="middle">SECTOR 13</text>
		<text x="1080" y="115" font-size="28" text-anchor="end">DARKDICTATOR.COM</text>
	</g>
	<line x1="120" y1="135" x2="1080" y2="135" stroke="#1a9a1a" stroke-width="2" stroke-dasharray="0"/>
	<line x1="120" y1="139" x2="1080" y2="139" stroke="#1a9a1a" stroke-width="2"/>

	<!-- Title -->
	<g font-family="'VT323', 'Courier New', monospace" text-anchor="middle">
		<text x="600" y="295" font-size="120" fill="#33ff33" filter="url(#bloom)" letter-spacing="6">DARK DICTATOR</text>
		<text x="600" y="350" font-size="36" fill="#22cc22" letter-spacing="4">// STATE NETWORK</text>
	</g>

	<!-- Tagline -->
	<g font-family="'VT323', 'Courier New', monospace" text-anchor="middle" fill="#22cc22" font-size="32">
		<text x="600" y="450">Guest terminal access. Your session is monitored.</text>
		<text x="600" y="490">Compliance is assumed unless revoked.</text>
	</g>

	<!-- Bottom blink prompt -->
	<g font-family="'VT323', 'Courier New', monospace" fill="#33ff33">
		<text x="600" y="540" text-anchor="middle" font-size="28">&gt;&gt; SELECT A DESTINATION █</text>
	</g>

	<!-- Vignette overlay -->
	<rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
